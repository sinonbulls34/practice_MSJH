<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國中生相似字型配對挑戰</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #e0e5ec;
            --primary: #20b2aa;     /* 青綠色 */
            --primary-dark: #178b85;
            --secondary: #f39c12;   /* 金橘色 */
            --text-main: #2d3436;
            --text-light: #636e72;
            
            /* 新擬物風陰影設定 */
            --shadow-out: 7px 7px 15px rgba(163, 177, 198, 0.6), -7px -7px 15px rgba(255, 255, 255, 0.7);
            --shadow-in: inset 5px 5px 10px rgba(163, 177, 198, 0.6), inset -5px -5px 10px rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: "PingFang TC", "微軟正黑體", "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
        }

        h1 {
            margin-top: 25px;
            color: var(--primary-dark);
            text-shadow: 2px 2px 4px rgba(163, 177, 198, 0.3);
            font-size: 28px;
        }

        /* 頂部控制面板 */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 15px;
            border-radius: 15px;
            box-shadow: var(--shadow-out);
            background: var(--bg-color);
        }

        select, button {
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            background-color: var(--bg-color);
            color: var(--text-main);
            outline: none;
            font-weight: bold;
            box-shadow: var(--shadow-out);
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        select:active, button:active {
            box-shadow: var(--shadow-in);
        }

        button {
            color: var(--primary-dark);
        }
        
        button.start-btn {
            background-color: var(--primary);
            color: white;
            box-shadow: 4px 4px 10px rgba(32, 178, 170, 0.4), -4px -4px 10px rgba(255, 255, 255, 0.6);
        }
        
        button.start-btn:active {
            box-shadow: inset 3px 3px 8px rgba(23, 139, 133, 0.6), inset -3px -3px 8px rgba(50, 200, 190, 0.6);
        }

        /* 狀態列：計時與進度 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
            margin-bottom: 15px;
            padding: 10px 20px;
            box-sizing: border-box;
            border-radius: 10px;
            box-shadow: var(--shadow-in);
            font-weight: bold;
            color: var(--text-light);
        }

        .timer {
            color: var(--secondary);
            font-size: 18px;
        }

        /* 遊戲網格 */
        #game-board {
            display: grid;
            gap: 10px;
            width: 90vw;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            padding: 15px;
            border-radius: 20px;
            box-shadow: var(--shadow-out);
            background: var(--bg-color);
            position: relative;
            box-sizing: border-box;
        }

        /* 遊戲開始前的遮罩層 */
        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(224, 229, 236, 0.85);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-dark);
            z-index: 10;
            backdrop-filter: blur(3px);
        }

        .tile {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(16px, 5vw, 36px);
            font-weight: bold;
            cursor: pointer;
            border-radius: 12px;
            box-shadow: var(--shadow-out);
            transition: all 0.2s ease;
            color: var(--text-main);
        }

        .tile:hover {
            transform: translateY(-2px);
        }

        .tile.selected {
            box-shadow: var(--shadow-in);
            color: var(--primary);
            transform: scale(0.95);
        }

        .tile.matched {
            box-shadow: var(--shadow-in);
            background-color: #d1f2eb; /* 淡淡的成功綠 */
            color: #27ae60;
            pointer-events: none;
            opacity: 0; /* 消除效果 */
            transform: scale(0.8);
            transition: all 0.4s ease-out;
        }

        /* 內容區塊 */
        .content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 90px;
        }

        .page {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.4s ease-in-out;
        }

        .page.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 底部標籤列 */
        .tabs {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 600px;
            display: flex;
            background: var(--bg-color);
            box-shadow: 0 -5px 15px rgba(163, 177, 198, 0.4);
            border-radius: 20px 20px 0 0;
            overflow: hidden;
            z-index: 100;
        }

        .tab {
            flex: 1;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            color: var(--text-light);
            transition: 0.3s;
            font-size: 18px;
        }

        .tab.active {
            color: var(--primary);
            background: rgba(32, 178, 170, 0.1);
            box-shadow: inset 0 -3px 0 var(--primary);
        }

        /* 排名表格 */
        .table-container {
            width: 90%;
            max-width: 600px;
            border-radius: 15px;
            box-shadow: var(--shadow-out);
            overflow: hidden;
            margin-top: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-color);
        }

        th, td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(163, 177, 198, 0.3);
        }

        th {
            background-color: var(--primary);
            color: white;
            font-weight: bold;
        }

        /* 彈出視窗 */
        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-color);
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 15px 15px 30px rgba(163, 177, 198, 0.8), -15px -15px 30px rgba(255, 255, 255, 0.9);
            text-align: center;
            z-index: 1000;
        }

        .modal h2 { color: var(--secondary); margin-top: 0;}
        .modal-bg {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 999;
        }
    </style>
</head>
<body>

    <div class="content">
        <div id="game-page" class="page active">
            <h1>📝 相似字大挑戰</h1>
            
            <div class="controls">
                <select id="grid-size">
                    <option value="2">2x2 表格</option>
                    <option value="4" selected>4x4 表格</option>
                    <option value="8">8x8 表格</option>
                </select>
                
                <select id="difficulty">
                    <option value="easy">輕鬆</option>
                    <option value="normal" selected>一般</option>
                    <option value="hard">挑戰</option>
                </select>
                
                <button class="start-btn" onclick="startGame()">▶ 開始遊戲</button>
            </div>

            <div class="status-bar">
                <div id="progress-display">剩餘組數：0</div>
                <div class="timer" id="timer-display">計時中：0 秒</div>
            </div>

            <div id="game-board">
                <div id="overlay">請點擊上方「開始遊戲」</div>
                </div>
        </div>

        <div id="rank-page" class="page">
            <h1>🏆 榮譽排行榜</h1>
            
            <div class="controls">
                <select id="rank-filter" onchange="renderRanking()">
                    <option value="2">2x2 排名</option>
                    <option value="4" selected>4x4 排名</option>
                    <option value="8">8x8 排名</option>
                </select>
            </div>

            <div class="table-container">
                <table id="rank-table">
                    <thead>
                        <tr>
                            <th>名次</th>
                            <th>難度</th>
                            <th>花費時間</th>
                            <th>日期時間</th>
                        </tr>
                    </thead>
                    <tbody id="rank-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('game')">🎮 遊戲大廳</div>
        <div class="tab" onclick="switchTab('rank')">🏆 排行榜</div>
    </div>

    <div class="modal-bg" id="modal-bg"></div>
    <div class="modal" id="win-modal">
        <h2>🏆 恭喜過關！</h2>
        <p id="win-diff">難度：一般</p>
        <p id="win-time">花費時間：0 秒</p>
        <button class="start-btn" onclick="closeModal()" style="margin-top: 15px;">確認</button>
    </div>

    <script>
        // 【核心邏輯升級】：將字庫改為「相似字群組」
        // 系統會盡量把同一個字串內的字「一起」挑出來放到同一張表格，增加混淆度！
        const charGroups = {
            easy: [
                '己已巳', '大太犬', '人入八', '千干于', '瓜爪', '木本末未', 
                '王玉主', '日曰白百', '土士工', '申由甲', '牛午', '幻幼', 
                '市巿', '矢失', '左在', '石右'
            ],
            normal: [
                '國圍圖圓', '戊戌戍戎戒', '侍恃待特持', '拆折析祈', '染梁粱', 
                '買賣', '免兔', '毫毛', '考老', '微徵', '烏鳥', '崇祟', 
                '狠狼', '貪貧', '準淮', '盲育', '即既', '延廷', '撥拔'
            ],
            hard: [
                '贏羸蠃', '辨辯辦瓣辮', '膏肓盲', '冀翼糞', '魑魅魍魎', 
                '黌龜竈龞', '鬱籲釁', '壼壺', '汩汨', '祗祇', '墬墜', 
                '薜薛', '齷齪', '贗贋', '擤擯', '彙彚', '塵麈', '煢煇'
            ]
        };

        const difficultyNames = { easy: "輕鬆", normal: "一般", hard: "挑戰" };

        let timerInterval = null;
        let elapsedSeconds = 0;
        let isPlaying = false;
        let firstSelected = null;
        let remainingPairs = 0;
        let currentSize = 4;
        let currentDiff = "normal";

        // 分頁切換邏輯
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            
            if (tabId === 'game') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('game-page').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('rank-page').classList.add('active');
                renderRanking();
            }
        }

        // 格式化時間 (超過 60 秒顯示 分+秒)
        function formatTime(seconds) {
            if (seconds < 60) return `${seconds} 秒`;
            return `${Math.floor(seconds / 60)} 分 ${seconds % 60} 秒`;
        }

        // 打亂陣列 (Fisher-Yates Shuffle)
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // 準備遊戲 (根據難度挑選相似字群組)
        function generatePairs(diff, requiredPairs) {
            let groups = shuffle([...charGroups[diff]]);
            let selectedChars = [];
            
            // 優先把同一組的字全部抓進來，製造強烈混淆
            for (let i = 0; i < groups.length; i++) {
                let charsInGroup = groups[i].split('');
                for (let char of charsInGroup) {
                    if (selectedChars.length < requiredPairs) {
                        selectedChars.push(char);
                    } else {
                        break;
                    }
                }
                if (selectedChars.length >= requiredPairs) break;
            }
            
            // 將抽出的字複製一份變成一對，並打亂順序
            return shuffle([...selectedChars, ...selectedChars]);
        }

        // 開始遊戲按鈕事件
        function startGame() {
            // 重置狀態
            clearInterval(timerInterval);
            elapsedSeconds = 0;
            isPlaying = true;
            firstSelected = null;
            document.getElementById('timer-display').innerText = "計時中：0 秒";
            document.getElementById('overlay').style.display = 'none'; // 隱藏遮罩

            currentSize = parseInt(document.getElementById('grid-size').value);
            currentDiff = document.getElementById('difficulty').value;
            remainingPairs = (currentSize * currentSize) / 2;
            updateProgress();
            
            // 建立網格
            const board = document.getElementById('game-board');
            board.style.gridTemplateColumns = `repeat(${currentSize}, 1fr)`;
            
            // 移除舊的卡片，保留 overlay
            Array.from(board.children).forEach(child => {
                if (child.id !== 'overlay') child.remove();
            });
            
            const gameChars = generatePairs(currentDiff, remainingPairs);
            
            // 渲染卡片
            gameChars.forEach((char, index) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerText = char;
                tile.dataset.char = char;
                tile.onclick = () => handleTileClick(tile);
                board.appendChild(tile);
            });

            // 開始計時
            timerInterval = setInterval(() => {
                elapsedSeconds++;
                document.getElementById('timer-display').innerText = `計時中：${formatTime(elapsedSeconds)}`;
            }, 1000);
        }

        // 更新剩餘組數
        function updateProgress() {
            document.getElementById('progress-display').innerText = `剩餘組數：${remainingPairs}`;
        }

        // 卡片點擊邏輯
        function handleTileClick(tile) {
            if (!isPlaying || tile.classList.contains('matched') || tile.classList.contains('selected')) {
                return;
            }

            tile.classList.add('selected');

            if (!firstSelected) {
                firstSelected = tile;
            } else {
                const secondSelected = tile;
                isPlaying = false; // 暫停點擊，防止連續亂點

                if (firstSelected.dataset.char === secondSelected.dataset.char) {
                    // 配對成功
                    setTimeout(() => {
                        firstSelected.classList.remove('selected');
                        secondSelected.classList.remove('selected');
                        firstSelected.classList.add('matched');
                        secondSelected.classList.add('matched');
                        firstSelected = null;
                        remainingPairs--;
                        updateProgress();
                        
                        if (remainingPairs === 0) {
                            handleWin();
                        } else {
                            isPlaying = true;
                        }
                    }, 300);
                } else {
                    // 配對失敗
                    setTimeout(() => {
                        firstSelected.classList.remove('selected');
                        secondSelected.classList.remove('selected');
                        firstSelected = null;
                        isPlaying = true;
                    }, 500); // 失敗翻回的延遲時間
                }
            }
        }

        // 勝利處理與特效
        function handleWin() {
            clearInterval(timerInterval);
            isPlaying = false;
            
            // 播放紙花特效
            fireConfetti();

            // 記錄成績
            const now = new Date();
            const dateString = `${now.getFullYear()}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            
            const record = {
                size: currentSize,
                diffName: difficultyNames[currentDiff],
                seconds: elapsedSeconds,
                date: dateString
            };

            saveRecord(record);
            
            // 顯示彈出視窗
            setTimeout(() => {
                document.getElementById('win-diff').innerText = `難度：${record.diffName} (${currentSize}x${currentSize})`;
                document.getElementById('win-time').innerText = `花費時間：${formatTime(elapsedSeconds)}`;
                document.getElementById('modal-bg').style.display = 'block';
                document.getElementById('win-modal').style.display = 'block';
                document.getElementById('overlay').style.display = 'flex'; // 重新顯示遮罩
                document.getElementById('overlay').innerText = '遊戲結束，請重新開始';
            }, 800);
        }

        function fireConfetti() {
            var duration = 3000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#20b2aa', '#f39c12', '#2ecc71', '#e74c3c']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#20b2aa', '#f39c12', '#2ecc71', '#e74c3c']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        function closeModal() {
            document.getElementById('modal-bg').style.display = 'none';
            document.getElementById('win-modal').style.display = 'none';
        }

        // 儲存紀錄
        function saveRecord(record) {
            let records = JSON.parse(localStorage.getItem('charMatchV2Records') || '[]');
            records.push(record);
            localStorage.setItem('charMatchV2Records', JSON.stringify(records));
        }

        // 渲染排行榜
        function renderRanking() {
            const filterSize = parseInt(document.getElementById('rank-filter').value);
            let records = JSON.parse(localStorage.getItem('charMatchV2Records') || '[]');
            
            // 過濾與排序
            records = records
                .filter(r => r.size === filterSize)
                .sort((a, b) => a.seconds - b.seconds);

            const tbody = document.getElementById('rank-body');
            tbody.innerHTML = '';

            if (records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="color:var(--text-light);">尚無挑戰紀錄，快去破關吧！</td></tr>';
                return;
            }

            records.forEach((r, index) => {
                let badge = index === 0 ? '🥇 ' : index === 1 ? '🥈 ' : index === 2 ? '🥉 ' : '';
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight:bold;">${badge}${index + 1}</td>
                    <td>${r.diffName}</td>
                    <td style="color:var(--secondary); font-weight:bold;">${formatTime(r.seconds)}</td>
                    <td style="font-size: 14px; color:var(--text-light);">${r.date}</td>
                `;
                tbody.appendChild(tr);
            });
        }
        
        // 初始化時不自動開始，只畫空網格
        window.onload = () => {
            const board = document.getElementById('game-board');
            board.style.gridTemplateColumns = `repeat(4, 1fr)`;
            for(let i=0; i<16; i++){
                const tile = document.createElement('div');
                tile.className = 'tile';
                board.appendChild(tile);
            }
            renderRanking();
        };

    </script>
</body>
</html>
