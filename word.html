<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國文近似字挑戰- 嘉義市民生國中不分類資源班</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8; /* 霓虹藍 - 配對 */
            --secondary: #fbbf24; /* 金黃 - 尋找 */
            --accent: #f472b6; /* 粉色 - 排名 */
            --text: #f8fafc;
            --correct: #4ade80;
            --wrong: #f87171;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        body {
            font-family: "SF Pro Display", "PingFang TC", "微軟正黑體", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 介面框架 */
        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            padding-bottom: 100px;
            display: none;
            flex-direction: column;
            align-items: center;
        }
        .container.active { display: flex; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 2rem; letter-spacing: 2px; margin-bottom: 10px; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }

        /* 頂部控制列 */
        .control-panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        .row { display: flex; gap: 10px; margin-bottom: 10px; justify-content: center; }
        select, button {
            background: #334155;
            color: white;
            border: 1px solid #475569;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }
        button.start-btn { background: var(--primary); border: none; font-weight: bold; width: 100%; margin-top: 10px; color: var(--bg); }
        button.start-btn:hover { transform: scale(1.02); filter: brightness(1.2); }

        /* 計時器 */
        .status-bar { display: flex; width: 100%; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .timer-box { font-family: monospace; font-size: 1.5rem; color: var(--secondary); background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 20px; }

        /* 遊戲網格 */
        .grid {
            display: grid;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 12px;
            width: 100%;
            aspect-ratio: 1/1;
        }
        .tile {
            background: var(--card-bg);
            border: 1px solid #475569;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        .tile:hover { background: #334155; border-color: var(--primary); }
        .tile.selected { background: var(--primary); color: var(--bg); transform: scale(0.95); }
        .tile.matched { opacity: 0; pointer-events: none; }
        .tile.found { background: var(--correct) !important; color: var(--bg); }

        /* 排行榜 */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: var(--accent); padding: 10px; border-bottom: 2px solid #334155; }
        td { padding: 10px; border-bottom: 1px solid #334155; font-size: 0.9rem; }

        /* 底部導航 */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #1e293b;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            z-index: 100;
        }
        .nav-item { cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 0.8rem; color: #94a3b8; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 1.5rem; margin-bottom: 4px; }

        /* 慶祝特效 */
        #celebration {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 999;
            display: none;
        }
        .confetti {
            position: absolute; width: 10px; height: 10px;
            background: var(--primary);
            animation: fall 3s linear infinite;
        }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }

        /* 難度標籤顏色 */
        .diff-easy { color: #4ade80; }
        .diff-normal { color: #fbbf24; }
        .diff-hard { color: #f87171; }
    </style>
</head>
<body>

    <div id="celebration"></div>

    <div id="page-pair" class="container active">
        <h1>🧩 相似字配對</h1>
        <div class="control-panel">
            <div class="row">
                <select id="pair-size">
                    <option value="2">2x2 表格</option>
                    <option value="4" selected>4x4 表格</option>
                    <option value="6">6x6 表格</option>
                    <option value="8">8x8 表格</option>
                </select>
                <select id="pair-diff">
                    <option value="easy">難度：輕鬆</option>
                    <option value="normal" selected>難度：一般</option>
                    <option value="hard">難度：挑戰</option>
                </select>
            </div>
            <button class="start-btn" onclick="initPairGame()">開始挑戰</button>
        </div>
        <div class="status-bar">
            <span>剩餘對數：<span id="pair-remain">0</span></span>
            <div class="timer-box" id="pair-timer">0s</div>
        </div>
        <div class="grid" id="pair-grid"></div>
    </div>

    <div id="page-search" class="container">
        <h1>🔍 漢字找不同</h1>
        <div class="control-panel">
            <div class="row">
                <select id="search-size">
                    <option value="2">2x2 表格</option>
                    <option value="5">5x5 表格</option>
                    <option value="8" selected>8x8 表格</option>
                    <option value="10">10x10 表格</option>
                </select>
                <select id="search-diff">
                    <option value="easy">難度：輕鬆</option>
                    <option value="normal" selected>難度：一般</option>
                    <option value="hard">難度：挑戰</option>
                </select>
            </div>
            <button class="start-btn" style="background: var(--secondary);" onclick="initSearchGame()">尋找目標</button>
        </div>
        <div class="status-bar">
            <span>目標：找出那顆「異類」</span>
            <div class="timer-box" id="search-timer" style="color:var(--secondary)">0s</div>
        </div>
        <div class="grid" id="search-grid"></div>
    </div>

    <div id="page-rank" class="container">
        <h1>🏆 英雄榜</h1>
        <div class="control-panel">
            <select id="rank-mode-filter" onchange="updateRankTable()" style="width:100%">
                <option value="pair">配對挑戰紀錄</option>
                <option value="search">尋找挑戰紀錄</option>
            </select>
        </div>
        <table id="rank-table">
            <thead>
                <tr>
                    <th>模式/規格</th>
                    <th>難度</th>
                    <th>時間</th>
                    <th>日期</th>
                </tr>
            </thead>
            <tbody id="rank-list"></tbody>
        </table>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('pair')">
            <span class="nav-icon">🧩</span>
            <span>配對</span>
        </div>
        <div class="nav-item" onclick="showPage('search')">
            <span class="nav-icon">🔍</span>
            <span>尋找</span>
        </div>
        <div class="nav-item" onclick="showPage('rank')">
            <span class="nav-icon">🏆</span>
            <span>排名</span>
        </div>
    </div>

    <script>
        // --- 資料設定 ---
        const charData = {
            easy: [["大", "太"], ["人", "入"], ["日", "曰"], ["口", "口"], ["土", "士"], ["八", "人"]],
            normal: [["國", "圍"], ["己", "已", "巳"], ["耍", "要"], ["免", "兔"], ["廷", "延"], ["崇", "嵩"]],
            hard: [["贏", "羸", "蠃"], ["辨", "辯", "辦", "瓣"], ["膏", "肓"], ["戌", "戍", "戎"], ["魑", "魅", "魍", "魎"]]
        };

        let timer = null;
        let seconds = 0;
        let currentMode = 'pair';
        let firstTile = null;
        let isProcessing = false;

        // --- 核心功能 ---

        function showPage(page) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`page-${page}`).classList.add('active');
            event.currentTarget.classList.add('active');
            currentMode = page;
            if(page === 'rank') updateRankTable();
            resetGameUI();
        }

        function formatTime(s) {
            if (s < 60) return `${s}s`;
            return `${Math.floor(s/60)}m ${s%60}s`;
        }

        function resetGameUI() {
            clearInterval(timer);
            seconds = 0;
            document.getElementById('pair-timer').innerText = "0s";
            document.getElementById('search-timer').innerText = "0s";
            isProcessing = false;
        }

        function startTimer(displayId) {
            clearInterval(timer);
            seconds = 0;
            timer = setInterval(() => {
                seconds++;
                document.getElementById(displayId).innerText = formatTime(seconds);
            }, 1000);
        }

        // --- 配對遊戲邏輯 ---
        function initPairGame() {
            resetGameUI();
            const size = parseInt(document.getElementById('pair-size').value);
            const diff = document.getElementById('pair-diff').value;
            const grid = document.getElementById('pair-grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

            let pairsCount = (size * size) / 2;
            let pool = [];
            
            // 隨機選取相似組
            let subPool = charData[diff].flat();
            for(let i=0; i<pairsCount; i++) {
                let char = subPool[Math.floor(Math.random() * subPool.length)];
                pool.push(char, char);
            }
            pool = pool.sort(() => Math.random() - 0.5);

            pool.forEach((char, i) => {
                const div = document.createElement('div');
                div.className = 'tile';
                div.innerText = char;
                div.onclick = () => handlePairClick(div);
                grid.appendChild(div);
            });

            document.getElementById('pair-remain').innerText = pairsCount;
            startTimer('pair-timer');
        }

        function handlePairClick(el) {
            if(isProcessing || el.classList.contains('selected') || el.classList.contains('matched')) return;

            el.classList.add('selected');

            if(!firstTile) {
                firstTile = el;
            } else {
                isProcessing = true;
                if(firstTile.innerText === el.innerText) {
                    setTimeout(() => {
                        firstTile.classList.add('matched');
                        el.classList.add('matched');
                        firstTile = null;
                        isProcessing = false;
                        let remain = parseInt(document.getElementById('pair-remain').innerText) - 1;
                        document.getElementById('pair-remain').innerText = remain;
                        if(remain === 0) winGame('pair');
                    }, 300);
                } else {
                    setTimeout(() => {
                        firstTile.classList.remove('selected');
                        el.classList.remove('selected');
                        firstTile = null;
                        isProcessing = false;
                    }, 500);
                }
            }
        }

        // --- 尋找遊戲邏輯 ---
        function initSearchGame() {
            resetGameUI();
            const size = parseInt(document.getElementById('search-size').value);
            const diff = document.getElementById('search-diff').value;
            const grid = document.getElementById('search-grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

            // 隨機選一組相似字
            const group = charData[diff][Math.floor(Math.random() * charData[diff].length)];
            const mainChar = group[0];
            const oddChar = group[Math.floor(Math.random() * (group.length - 1)) + 1] || group[1] || group[0];

            let tiles = new Array(size * size).fill(mainChar);
            const oddIndex = Math.floor(Math.random() * tiles.length);
            tiles[oddIndex] = oddChar;

            tiles.forEach((char, i) => {
                const div = document.createElement('div');
                div.className = 'tile';
                div.innerText = char;
                if(i === oddIndex) {
                    div.onclick = () => { div.classList.add('found'); winGame('search'); };
                } else {
                    div.onclick = () => { 
                        div.style.background = 'var(--wrong)';
                        setTimeout(() => div.style.background = '', 300);
                    };
                }
                grid.appendChild(div);
            });
            startTimer('search-timer');
        }

        // --- 勝利與紀錄 ---
        function winGame(mode) {
            clearInterval(timer);
            const size = document.getElementById(`${mode}-size`).value;
            const diff = document.getElementById(`${mode}-diff`).value;
            
            // 儲存紀錄
            const records = JSON.parse(localStorage.getItem('game_ranks') || '[]');
            const newRecord = {
                mode: mode,
                spec: `${size}x${size}`,
                diff: diff,
                time: seconds,
                date: new Date().toLocaleString('zh-TW', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'})
            };
            records.push(newRecord);
            localStorage.setItem('game_ranks', JSON.stringify(records));

            playCelebration();
            setTimeout(() => alert(`🎉 完美達成！\n耗時：${formatTime(seconds)}`), 500);
        }

        function playCelebration() {
            const container = document.getElementById('celebration');
            container.style.display = 'block';
            container.innerHTML = '';
            for(let i=0; i<100; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.background = `hsl(${Math.random()*360}, 70%, 60%)`;
                c.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(c);
            }
            setTimeout(() => container.style.display = 'none', 4000);
        }

        function updateRankTable() {
            const filterMode = document.getElementById('rank-mode-filter').value;
            const records = JSON.parse(localStorage.getItem('game_ranks') || '[]');
            const list = document.getElementById('rank-list');
            list.innerHTML = '';

            const filtered = records
                .filter(r => r.mode === filterMode)
                .sort((a, b) => a.time - b.time);

            filtered.forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${r.spec}</td>
                    <td class="diff-${r.diff}">${r.diff.toUpperCase()}</td>
                    <td>${formatTime(r.time)}</td>
                    <td>${r.date}</td>
                `;
                list.appendChild(tr);
            });
        }

        // 初始化
        window.onload = () => {
            initPairGame();
        };

    </script>
</body>
</html>
