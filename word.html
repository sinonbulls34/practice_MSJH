<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文近似字挑戰- 嘉義市民生國中不分類資源班</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary-glow: #38bdf8;
            --secondary-glow: #fbbf24;
            --accent-green: #4ade80;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 標題設計 */
        header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(180deg, #1e293b 0%, transparent 100%);
            width: 100%;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--primary-glow);
            color: var(--primary-glow);
        }

        /* 控制區 */
        .controls {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 15px;
            border: 1px solid #334155;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        select, button {
            background: #0f172a;
            color: white;
            border: 1px solid #334155;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
        }

        button.start-btn {
            background: var(--primary-glow);
            color: #0f172a;
            font-weight: bold;
            border: none;
            cursor: pointer;
            padding: 8px 20px;
        }

        button.start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* 計時器 */
        .timer-box {
            font-size: 1.2rem;
            font-family: 'Courier New', monospace;
            color: var(--secondary-glow);
            margin-bottom: 10px;
            background: #000;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--secondary-glow);
        }

        /* 遊戲網格 */
        #game-container {
            flex-grow: 1;
            width: 95%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 80px;
        }

        #grid {
            display: grid;
            gap: 8px;
            background: #334155;
            padding: 8px;
            border-radius: 8px;
            width: 100%;
            aspect-ratio: 1 / 1;
        }

        .tile {
            background: var(--card-bg);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            user-select: none;
            border: 1px solid #475569;
        }

        .tile:hover {
            background: #334155;
            border-color: var(--primary-glow);
        }

        .tile.selected {
            background: var(--primary-glow);
            color: #000;
        }

        .tile.correct {
            animation: pulse 0.3s;
            visibility: hidden;
        }

        .tile.wrong {
            background: #ef4444;
            animation: shake 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* 分頁欄 */
        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 65px;
            background: #1e293b;
            display: flex;
            border-top: 1px solid #334155;
        }

        .tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--text-dim);
            cursor: pointer;
        }

        .tab.active {
            color: var(--primary-glow);
            background: rgba(56, 189, 248, 0.1);
        }

        .tab-icon { font-size: 20px; margin-bottom: 4px; }

        /* 排行榜頁面 */
        .page { display: none; width: 100%; padding: 20px; max-width: 800px; }
        .page.active { display: block; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }

        th { background: #0f172a; color: var(--primary-glow); }

    </style>
</head>
<body>

    <header>
        <h1 id="page-title">相似字配對挑戰</h1>
    </header>

    <div id="game-page" class="page active">
        <div class="controls">
            <select id="grid-size">
                <option value="2">2x2 表格</option>
                <option value="4" selected>4x4 表格</option>
                <option value="6">6x6 表格</option>
                <option value="8">8x8 表格</option>
            </select>
            <select id="diff">
                <option value="easy">輕鬆</option>
                <option value="normal" selected>一般</option>
                <option value="hard">挑戰</option>
            </select>
            <button class="start-btn" onclick="initMatching()">開始遊戲</button>
        </div>
        <center><div class="timer-box" id="timer">準備就緒</div></center>
        <div id="game-container">
            <div id="grid"></div>
        </div>
    </div>

    <div id="search-page" class="page">
        <div class="controls">
            <select id="search-size">
                <option value="2">2x2</option>
                <option value="5">5x5</option>
                <option value="8">8x8</option>
                <option value="10">10x10</option>
            </select>
            <select id="search-diff">
                <option value="easy">輕鬆</option>
                <option value="normal" selected>一般</option>
                <option value="hard">挑戰</option>
            </select>
            <button class="start-btn" onclick="initSearch()">開始挑戰</button>
        </div>
        <center><div class="timer-box" id="search-timer">準備就緒</div></center>
        <div id="search-container" style="width:100%; display: flex; justify-content: center;">
            <div id="search-grid" style="display: grid; gap: 5px; background: #334155; padding: 8px; border-radius: 8px; width: 100%; aspect-ratio: 1/1;"></div>
        </div>
    </div>

    <div id="rank-page" class="page">
        <div class="controls">
            <select id="rank-type" onchange="showRank()">
                <option value="match">配對模式</option>
                <option value="search">尋找模式</option>
            </select>
        </div>
        <table id="rank-table">
            <thead>
                <tr>
                    <th>名次</th>
                    <th>規模/難度</th>
                    <th>時間</th>
                    <th>日期</th>
                </tr>
            </thead>
            <tbody id="rank-body"></tbody>
        </table>
    </div>

    <div class="tab-bar">
        <div class="tab active" onclick="switchTab('game')">
            <span class="tab-icon">🧩</span><span>配對</span>
        </div>
        <div class="tab" onclick="switchTab('search')">
            <span class="tab-icon">🔍</span><span>尋找</span>
        </div>
        <div class="tab" onclick="switchTab('rank')">
            <span class="tab-icon">🏆</span><span>排名</span>
        </div>
    </div>

    <script>
        // --- 題庫豐富化 ---
        const similarityPool = {
            easy: [
                ['大', '太', '犬'], ['日', '曰', '目'], ['己', '已', '巳'], ['人', '入', '八'],
                ['土', '士'], ['干', '千', '于'], ['口', '回'], ['由', '甲', '申']
            ],
            normal: [
                ['國', '圍', '圖', '圈'], ['戊', '戌', '戍', '戎', '戒'], ['買', '賣'], ['免', '兔'],
                ['侍', '恃', '待', '持'], ['拆', '折', '析'], ['汩', '汨'], ['梁', '粱'],
                ['幕', '慕', '墓', '暮'], ['崇', '祟'], ['廷', '延']
            ],
            hard: [
                ['辨', '辯', '辦', '瓣', '辮'], ['贏', '羸', '蠃', '贏'], ['璧', '壁', '劈', '霹'],
                ['膏', '肓', '育'], ['冀', '翼'], ['黌', '黽'], ['魑', '魅', '魍', '魎'],
                ['贏', '蠃'], ['鬱', '籲'], ['髒', '臟']
            ]
        };

        let timerInt;
        let startTime;
        let currentMode = 'match';

        function switchTab(tab) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            clearInterval(timerInt);
            
            if(tab === 'game') {
                document.getElementById('game-page').classList.add('active');
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('page-title').innerText = "相似字配對挑戰";
            } else if(tab === 'search') {
                document.getElementById('search-page').classList.add('active');
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('page-title').innerText = "找出不一樣的字";
            } else {
                document.getElementById('rank-page').classList.add('active');
                document.querySelectorAll('.tab')[2].classList.add('active');
                document.getElementById('page-title').innerText = "榮譽排行榜";
                showRank();
            }
        }

        function formatTime(ms) {
            let s = Math.floor(ms / 1000);
            if (s < 60) return `${s} 秒`;
            return `${Math.floor(s/60)} 分 ${s%60} 秒`;
        }

        function startTimer(displayId) {
            startTime = Date.now();
            timerInt = setInterval(() => {
                let diff = Date.now() - startTime;
                document.getElementById(displayId).innerText = formatTime(diff);
            }, 100);
        }

        // --- 配對模式邏輯 ---
        let firstTile = null;
        let pairsLeft = 0;

        function initMatching() {
            const size = parseInt(document.getElementById('grid-size').value);
            const diff = document.getElementById('diff').value;
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            
            let total = size * size;
            pairsLeft = total / 2;
            let chars = [];
            
            let sets = [...similarityPool[diff]];
            for(let i=0; i<pairsLeft; i++) {
                let set = sets[Math.floor(Math.random() * sets.length)];
                let char = set[Math.floor(Math.random() * set.length)];
                chars.push(char, char);
            }
            chars.sort(() => Math.random() - 0.5);

            chars.forEach(c => {
                const div = document.createElement('div');
                div.className = 'tile';
                div.innerText = c;
                div.onclick = () => handleMatch(div);
                grid.appendChild(div);
            });
            
            startTimer('timer');
        }

        function handleMatch(tile) {
            if(tile.classList.contains('correct') || tile === firstTile) return;
            tile.classList.add('selected');

            if(!firstTile) {
                firstTile = tile;
            } else {
                if(firstTile.innerText === tile.innerText) {
                    let a = firstTile, b = tile;
                    setTimeout(() => {
                        a.classList.add('correct');
                        b.classList.add('correct');
                    }, 200);
                    pairsLeft--;
                    if(pairsLeft === 0) win('match');
                } else {
                    let a = firstTile, b = tile;
                    setTimeout(() => {
                        a.classList.remove('selected');
                        b.classList.remove('selected');
                        b.classList.add('wrong');
                        setTimeout(() => b.classList.remove('wrong'), 300);
                    }, 400);
                }
                firstTile = null;
            }
        }

        // --- 尋找模式邏輯 ---
        function initSearch() {
            const size = parseInt(document.getElementById('search-size').value);
            const diff = document.getElementById('search-diff').value;
            const grid = document.getElementById('search-grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            
            let sets = [...similarityPool[diff]];
            let targetSet = sets[Math.floor(Math.random()*sets.length)];
            
            // 挑選兩個不一樣但相似的字
            let mainChar, diffChar;
            if(targetSet.length >= 2) {
                let temp = [...targetSet].sort(() => Math.random() - 0.5);
                mainChar = temp[0];
                diffChar = temp[1];
            } else {
                mainChar = targetSet[0];
                diffChar = '？'; 
            }

            let diffIndex = Math.floor(Math.random() * (size * size));

            for(let i=0; i < size*size; i++) {
                const div = document.createElement('div');
                div.className = 'tile';
                div.style.fontSize = size > 8 ? '16px' : '24px';
                div.innerText = (i === diffIndex) ? diffChar : mainChar;
                div.onclick = () => {
                    if(i === diffIndex) {
                        div.style.background = 'var(--accent-green)';
                        win('search');
                    } else {
                        div.classList.add('wrong');
                        setTimeout(() => div.classList.remove('wrong'), 300);
                    }
                };
                grid.appendChild(div);
            }
            startTimer('search-timer');
        }

        function win(type) {
            clearInterval(timerInt);
            let duration = Date.now() - startTime;
            
            // 慶祝動畫
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#38bdf8', '#fbbf24', '#4ade80']
            });

            // 儲存紀錄
            let size = type === 'match' ? document.getElementById('grid-size').value : document.getElementById('search-size').value;
            let diff = type === 'match' ? document.getElementById('diff').value : document.getElementById('search-diff').value;
            
            let records = JSON.parse(localStorage.getItem('game_ranks') || '[]');
            records.push({
                type,
                info: `${size}x${size} (${diff})`,
                time: duration,
                date: new Date().toLocaleString()
            });
            localStorage.setItem('game_ranks', JSON.stringify(records));

            setTimeout(() => alert(`挑戰成功！花費時間：${formatTime(duration)}`), 500);
        }

        function showRank() {
            let type = document.getElementById('rank-type').value;
            let records = JSON.parse(localStorage.getItem('game_ranks') || '[]');
            let filtered = records.filter(r => r.type === type).sort((a,b) => a.time - b.time);
            
            let html = '';
            filtered.forEach((r, i) => {
                html += `<tr>
                    <td>${i+1}</td>
                    <td>${r.info}</td>
                    <td>${formatTime(r.time)}</td>
                    <td>${r.date}</td>
                </tr>`;
            });
            document.getElementById('rank-body').innerHTML = html || '<tr><td colspan="4">尚無紀錄</td></tr>';
        }
    </script>
</body>
</html>
