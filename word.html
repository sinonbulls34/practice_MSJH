<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國字挑戰賽</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-bg: #e0e5ec;
            --accent-cyan: #2dccbb;
            --accent-blue: #4a90e2;
            --text-main: #3d4c5f;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --tile-hover: #d1d9e6;
        }

        * { box-sizing: border-box; font-family: 'Noto Sans TC', sans-serif; }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        h1 { margin: 20px 0 10px; font-weight: 700; color: var(--text-main); text-shadow: 1px 1px 2px var(--shadow-light); }

        /* 新擬物風卡片 */
        .card {
            background: var(--primary-bg);
            border-radius: 20px;
            box-shadow: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light);
            padding: 20px;
            width: 90%;
            max-width: 600px;
            margin-top: 20px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        select, button {
            border: none;
            outline: none;
            padding: 10px 20px;
            border-radius: 10px;
            background: var(--primary-bg);
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
            cursor: pointer;
            color: var(--text-main);
            font-weight: bold;
            transition: 0.2s;
        }

        button:active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }

        .start-btn { background-color: var(--accent-cyan); color: white; }

        .timer {
            font-size: 1.5rem;
            color: var(--accent-blue);
            margin: 10px 0;
            font-weight: bold;
        }

        /* 遊戲網格 */
        .board-container {
            display: grid;
            gap: 8px;
            margin: 0 auto;
            padding: 10px;
            background: var(--primary-bg);
            border-radius: 15px;
            box-shadow: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light);
        }

        .tile {
            aspect-ratio: 1/1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--primary-bg);
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
            border-radius: 8px;
            font-size: 2rem;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
        }

        .tile:hover { background-color: var(--tile-hover); }
        .tile.selected { color: var(--accent-cyan); box-shadow: inset 4px 4px 8px var(--shadow-dark); }
        .tile.cleared { visibility: hidden; }

        /* 分頁切換 */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: var(--primary-bg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -5px 15px var(--shadow-dark);
            z-index: 100;
        }

        .nav-item {
            cursor: pointer;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: #888;
        }

        .nav-item.active { color: var(--accent-cyan); }
        .nav-item i { font-size: 1.5rem; margin-bottom: 4px; }

        .page { display: none; width: 100%; flex-direction: column; align-items: center; }
        .page.active { display: flex; }

        /* 排行榜表格 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; border-radius: 10px; overflow: hidden; }
        th { background-color: var(--accent-blue); color: white; padding: 10px; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #ddd; background: white; }

        /* 響應式字體 */
        @media (max-width: 400px) { .tile { font-size: 1.2rem; } }
    </style>
</head>
<body>

    <div id="match-page" class="page active">
        <h1>🧩 相似字配對</h1>
        <div class="card">
            <div class="controls">
                <select id="match-size">
                    <option value="2">2x2</option>
                    <option value="4" selected>4x4</option>
                    <option value="8">8x8</option>
                </select>
                <select id="match-diff">
                    <option value="easy">輕鬆</option>
                    <option value="normal" selected>一般</option>
                    <option value="hard">挑戰</option>
                </select>
                <button class="start-btn" onclick="initMatchGame()">開始遊戲</button>
            </div>
            <center><div class="timer" id="match-timer">0 秒</div></center>
            <div id="match-board" class="board-container"></div>
        </div>
    </div>

    <div id="find-page" class="page">
        <h1>🔍 找出不同字</h1>
        <div class="card">
            <div class="controls">
                <select id="find-size">
                    <option value="2">2x2</option>
                    <option value="5" selected>5x5</option>
                    <option value="10">10x10</option>
                </select>
                <select id="find-diff">
                    <option value="easy">輕鬆</option>
                    <option value="normal" selected>一般</option>
                    <option value="hard">挑戰</option>
                </select>
                <button class="start-btn" onclick="initFindGame()">開始遊戲</button>
            </div>
            <center><div class="timer" id="find-timer">0 秒</div></center>
            <div id="find-board" class="board-container"></div>
        </div>
    </div>

    <div id="rank-page" class="page">
        <h1>🏆 榮譽榜</h1>
        <div class="card">
            <div class="controls">
                <select id="rank-type" onchange="renderRanking()">
                    <option value="match">配對模式</option>
                    <option value="find">尋找模式</option>
                </select>
                <select id="rank-size-filter" onchange="renderRanking()">
                    <option value="all">全部規模</option>
                </select>
            </div>
            <table id="rank-table">
                <thead>
                    <tr><th>名次</th><th>規模/難度</th><th>時間</th><th>日期</th></tr>
                </thead>
                <tbody id="rank-body"></tbody>
            </table>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="switchPage('match')"><span>🧩 配對</span></div>
        <div class="nav-item" onclick="switchPage('find')"><span>🔍 尋找</span></div>
        <div class="nav-item" onclick="switchPage('rank')"><span>🏆 排名</span></div>
    </nav>

    <script>
        // --- 核心資料 ---
        const charSets = {
            easy: [["日","曰"], ["人","入"], ["八","人"], ["土","士"], ["己","已"], ["干","于"]],
            normal: [["戌","戍"], ["戌","戊"], ["戎","戒"], ["侍","恃"], ["買","賣"], ["末","未"], ["析","折"]],
            hard: [["國","圍"], ["贏","羸"], ["贏","蠃"], ["辨","辯"], ["辯","辦"], ["瓣","辮"], ["膏","肓"], ["璧","壁"]]
        };

        let timerInterval;
        let seconds = 0;
        let isRunning = false;
        let matchSelected = null;
        let matchLeft = 0;

        // --- 頁面切換 ---
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId + '-page').classList.add('active');
            event.currentTarget.classList.add('active');
            if(pageId === 'rank') renderRanking();
            stopTimer();
        }

        // --- 計時功能 ---
        function startTimer(displayId) {
            stopTimer();
            seconds = 0;
            isRunning = true;
            const display = document.getElementById(displayId);
            display.innerText = "0 秒";
            timerInterval = setInterval(() => {
                seconds++;
                if (seconds < 60) {
                    display.innerText = seconds + " 秒";
                } else {
                    display.innerText = Math.floor(seconds / 60) + " 分 " + (seconds % 60) + " 秒";
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            isRunning = false;
        }

        // --- 慶祝動畫 ---
        function celebrate() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        // --- 1. 配對遊戲邏輯 ---
        function initMatchGame() {
            const size = parseInt(document.getElementById('match-size').value);
            const diff = document.getElementById('match-diff').value;
            const board = document.getElementById('match-board');
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

            const totalTiles = size * size;
            matchLeft = totalTiles / 2;
            let pairs = [];
            const sets = charSets[diff];

            for (let i = 0; i < matchLeft; i++) {
                const randomSet = sets[Math.floor(Math.random() * sets.length)];
                const char = randomSet[Math.floor(Math.random() * 2)];
                pairs.push(char, char);
            }
            pairs.sort(() => Math.random() - 0.5);

            pairs.forEach(char => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerText = char;
                tile.onclick = () => handleMatchClick(tile);
                board.appendChild(tile);
            });

            startTimer('match-timer');
        }

        function handleMatchClick(tile) {
            if (!isRunning || tile.classList.contains('cleared')) return;
            tile.classList.add('selected');

            if (!matchSelected) {
                matchSelected = tile;
            } else if (matchSelected === tile) {
                tile.classList.remove('selected');
                matchSelected = null;
            } else {
                if (matchSelected.innerText === tile.innerText) {
                    setTimeout(() => {
                        matchSelected.classList.add('cleared');
                        tile.classList.add('cleared');
                        matchSelected = null;
                        matchLeft--;
                        if (matchLeft === 0) winGame('match');
                    }, 200);
                } else {
                    const prev = matchSelected;
                    setTimeout(() => {
                        prev.classList.remove('selected');
                        tile.classList.remove('selected');
                    }, 400);
                    matchSelected = null;
                }
            }
        }

        // --- 2. 尋找模式邏輯 ---
        function initFindGame() {
            const size = parseInt(document.getElementById('find-size').value);
            const diff = document.getElementById('find-diff').value;
            const board = document.getElementById('find-board');
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

            const sets = charSets[diff];
            const randomSet = sets[Math.floor(Math.random() * sets.length)];
            const baseChar = randomSet[0];
            const oddChar = randomSet[1];

            const total = size * size;
            const oddIndex = Math.floor(Math.random() * total);

            for (let i = 0; i < total; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerText = (i === oddIndex) ? oddChar : baseChar;
                if (i === oddIndex) {
                    tile.onclick = () => winGame('find');
                } else {
                    tile.onclick = () => tile.style.color = 'red';
                }
                board.appendChild(tile);
            }
            startTimer('find-timer');
        }

        // --- 結算與排行榜 ---
        function winGame(type) {
            stopTimer();
            celebrate();
            const timeStr = document.getElementById(type + '-timer').innerText;
            const size = document.getElementById(type + '-size').value;
            const diff = document.getElementById(type + '-diff').value;

            const record = {
                type,
                desc: `${size}x${size} (${diff})`,
                size: size,
                seconds,
                timeStr,
                date: new Date().toLocaleString()
            };

            let records = JSON.parse(localStorage.getItem('game_ranks') || '[]');
            records.push(record);
            localStorage.setItem('game_ranks', JSON.stringify(records));

            setTimeout(() => alert(`太強了！完成挑戰！\n時間：${timeStr}`), 500);
        }

        function renderRanking() {
            const type = document.getElementById('rank-type').value;
            const records = JSON.parse(localStorage.getItem('game_ranks') || '[]');
            const tbody = document.getElementById('rank-body');
            tbody.innerHTML = '';

            const filtered = records
                .filter(r => r.type === type)
                .sort((a, b) => a.seconds - b.seconds);

            filtered.forEach((r, i) => {
                const tr = `<tr><td>${i+1}</td><td>${r.desc}</td><td>${r.timeStr}</td><td>${r.date}</td></tr>`;
                tbody.innerHTML += tr;
            });
        }
    </script>
</body>
</html>
