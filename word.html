<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文近似字挑戰- 嘉義市民生國中不分類資源班</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary-cyan: #22d3ee;
            --accent-gold: #fbbf24;
            --text-light: #f1f5f9;
            --wrong-red: #ef4444;
            --correct-green: #10b981;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: "Noto Sans TC", "微軟正黑體", sans-serif;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 頂部標題 */
        .header {
            padding: 20px;
            text-align: center;
            width: 100%;
            background: linear-gradient(to bottom, #1e293b, transparent);
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 4px;
            color: var(--primary-cyan);
            text-shadow: 0 0 15px rgba(34, 211, 238, 0.5);
        }

        /* 導覽列 */
        .tabs {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #1e293b;
            display: flex;
            border-top: 1px solid #334155;
            z-index: 100;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            color: #94a3b8;
            transition: all 0.3s;
        }

        .tab.active {
            color: var(--primary-cyan);
            background: rgba(34, 211, 238, 0.1);
            border-top: 3px solid var(--primary-cyan);
        }

        /* 內容容器 */
        .container {
            width: 95%;
            max-width: 600px;
            padding: 20px;
            margin-bottom: 80px;
        }

        .page { display: none; }
        .page.active { display: flex; flex-direction: column; align-items: center; }

        /* 控制區 */
        .control-panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            border: 1px solid #334155;
        }

        .setting-group {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            gap: 10px;
        }

        select, button {
            background: #0f172a;
            color: white;
            border: 1px solid #334155;
            padding: 10px;
            border-radius: 8px;
            flex: 1;
            font-size: 0.9rem;
        }

        .btn-start {
            background: var(--primary-cyan);
            color: var(--bg-dark);
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-start:hover { transform: scale(1.05); }

        /* 計時器 */
        .timer-box {
            font-size: 1.5rem;
            color: var(--accent-gold);
            font-family: monospace;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.4);
        }

        /* 遊戲網格 */
        .grid {
            display: grid;
            gap: 6px;
            width: 100%;
            aspect-ratio: 1/1;
            margin-top: 10px;
        }

        .tile {
            background: #334155;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            color: var(--text-light);
        }

        /* 相似字樣式優化 */
        .tile-text {
            pointer-events: none;
        }

        .tile:hover { background: #475569; }
        .tile.selected { background: var(--primary-cyan); color: var(--bg-dark); }
        .tile.cleared { visibility: hidden; }
        .tile.wrong { background: var(--wrong-red); animation: shake 0.3s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* 排名表格 */
        .rank-container { width: 100%; overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
        }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; font-size: 0.85rem; }
        th { background: #334155; color: var(--primary-cyan); }

        /* 響應式字體 */
        .size-2 { font-size: 60px; }
        .size-4 { font-size: 30px; }
        .size-5 { font-size: 24px; }
        .size-8 { font-size: 16px; }
        .size-10 { font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>GHOST CHARACTERS</h1>
    </div>

    <div class="container">
        <div id="page-match" class="page active">
            <div class="control-panel">
                <div class="setting-group">
                    <select id="match-size">
                        <option value="2">2x2</option>
                        <option value="4" selected>4x4</option>
                        <option value="8">8x8</option>
                    </select>
                    <select id="match-diff">
                        <option value="easy">輕鬆</option>
                        <option value="normal" selected>一般</option>
                        <option value="hard">挑戰</option>
                    </select>
                </div>
                <button class="btn-start" onclick="initMatchGame()">開始配對挑戰</button>
            </div>
            <div class="timer-box" id="match-timer">0 秒</div>
            <div id="match-grid" class="grid"></div>
        </div>

        <div id="page-find" class="page">
            <div class="control-panel">
                <div class="setting-group">
                    <select id="find-size">
                        <option value="2">2x2</option>
                        <option value="5" selected>5x5</option>
                        <option value="8">8x8</option>
                        <option value="10">10x10</option>
                    </select>
                    <select id="find-diff">
                        <option value="easy">輕鬆</option>
                        <option value="normal" selected>一般</option>
                        <option value="hard">挑戰</option>
                    </select>
                </div>
                <button class="btn-start" onclick="initFindGame()">開始尋找不同</button>
            </div>
            <div class="timer-box" id="find-timer">0 秒</div>
            <div id="find-grid" class="grid"></div>
        </div>

        <div id="page-rank" class="page">
            <div class="control-panel">
                <select id="rank-type-filter" onchange="showRank()">
                    <option value="match">配對挑戰</option>
                    <option value="find">尋找不同</option>
                </select>
            </div>
            <div class="rank-container">
                <table>
                    <thead>
                        <tr>
                            <th>格數</th>
                            <th>難度</th>
                            <th>時間</th>
                            <th>日期</th>
                        </tr>
                    </thead>
                    <tbody id="rank-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('match')">🧩 配對</div>
        <div class="tab" onclick="switchTab('find')">🔍 尋找</div>
        <div class="tab" onclick="switchTab('rank')">🏆 排名</div>
    </div>

    <script>
        // --- 豐富題庫設計 ---
        const DB = {
            easy: [
                ['大', '太', '犬'], ['日', '曰', '目'], ['己', '已', '巳'], ['土', '士'], 
                ['干', '千', '于'], ['王', '玉', '主'], ['木', '本', '末', '未'], ['人', '入', '八']
            ],
            normal: [
                ['國', '圍', '園', '圈'], ['待', '侍', '恃', '特', '持'], ['戊', '戌', '戍', '戎'],
                ['買', '賣', '賈'], ['盲', '肓', '育'], ['析', '折', '拆'], ['亨', '享', '烹'],
                ['毫', '毫', '毛'], ['卷', '券'], ['崇', '嵩'], ['渴', '喝', '揭']
            ],
            hard: [
                ['贏', '羸', '蠃', '嬴', '臝'], ['辨', '辯', '辦', '瓣', '辮'], ['齷', '齪', '齲', '齏'],
                ['璧', '壁', '劈', '避'], ['憂', '優', '擾'], ['纂', '篡', '算'], ['馨', '聲', '罄'],
                ['龐', '寵', '龍'], ['囂', '囂', '器'], ['鬱', '鬰'], ['邋', '遢']
            ]
        };

        let timerInterval;
        let seconds = 0;
        let isRunning = false;
        let matchSelected = null;
        let gameType = 'match'; // match or find

        // --- 通用功能 ---
        function switchTab(type) {
            gameType = type;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`page-${type}`).classList.add('active');
            if(type === 'rank') showRank();
            stopTimer();
        }

        function stopTimer() {
            clearInterval(timerInterval);
            isRunning = false;
        }

        function startTimer(displayId) {
            stopTimer();
            seconds = 0;
            isRunning = true;
            const display = document.getElementById(displayId);
            timerInterval = setInterval(() => {
                seconds++;
                if (seconds < 60) {
                    display.innerText = `${seconds} 秒`;
                } else {
                    display.innerText = `${Math.floor(seconds / 60)} 分 ${seconds % 60} 秒`;
                }
            }, 1000);
        }

        function celebrate() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#22d3ee', '#fbbf24', '#f1f5f9']
            });
        }

        // --- 配對遊戲邏輯 ---
        function initMatchGame() {
            const size = parseInt(document.getElementById('match-size').value);
            const diff = document.getElementById('match-diff').value;
            const grid = document.getElementById('match-grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            
            startTimer('match-timer');
            
            const totalPairs = (size * size) / 2;
            let selectedChars = [];
            
            // 從豐富字庫隨機抓取
            let pool = [];
            DB[diff].forEach(group => pool.push(...group));
            pool = Array.from(new Set(pool)).sort(() => Math.random() - 0.5);
            
            for(let i=0; i<totalPairs; i++) {
                const char = pool[i % pool.length];
                selectedChars.push(char, char);
            }
            selectedChars.sort(() => Math.random() - 0.5);

            selectedChars.forEach(char => {
                const tile = document.createElement('div');
                tile.className = `tile size-${size}`;
                tile.innerText = char;
                tile.onclick = () => handleMatchClick(tile);
                grid.appendChild(tile);
            });
        }

        function handleMatchClick(tile) {
            if(!isRunning || tile.classList.contains('cleared')) return;

            if(!matchSelected) {
                matchSelected = tile;
                tile.classList.add('selected');
            } else if(matchSelected === tile) {
                tile.classList.remove('selected');
                matchSelected = null;
            } else {
                if(matchSelected.innerText === tile.innerText) {
                    tile.classList.add('selected');
                    setTimeout(() => {
                        tile.classList.replace('selected', 'cleared');
                        matchSelected.classList.replace('selected', 'cleared');
                        matchSelected = null;
                        checkWin('match');
                    }, 200);
                } else {
                    tile.classList.add('wrong');
                    matchSelected.classList.add('wrong');
                    const temp = matchSelected;
                    setTimeout(() => {
                        tile.classList.remove('wrong', 'selected');
                        temp.classList.remove('wrong', 'selected');
                    }, 400);
                    matchSelected = null;
                }
            }
        }

        // --- 尋找遊戲邏輯 ---
        function initFindGame() {
            const size = parseInt(document.getElementById('find-size').value);
            const diff = document.getElementById('find-diff').value;
            const grid = document.getElementById('find-grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            
            startTimer('find-timer');

            // 從題庫挑選一組相似字
            const groups = DB[diff];
            const randomGroup = groups[Math.floor(Math.random() * groups.length)];
            const sub = [...randomGroup].sort(() => Math.random() - 0.5);
            const mainChar = sub[0];
            const targetChar = sub[1];

            const total = size * size;
            const targetIdx = Math.floor(Math.random() * total);

            for(let i=0; i<total; i++) {
                const tile = document.createElement('div');
                tile.className = `tile size-${size}`;
                tile.innerText = (i === targetIdx) ? targetChar : mainChar;
                tile.onclick = () => {
                    if(i === targetIdx) {
                        tile.style.background = 'var(--correct-green)';
                        saveRecord('find', size, diff, seconds);
                        celebrate();
                        stopTimer();
                    } else {
                        tile.classList.add('wrong');
                        setTimeout(() => tile.classList.remove('wrong'), 400);
                    }
                };
                grid.appendChild(tile);
            }
        }

        function checkWin(type) {
            const cleared = document.querySelectorAll('.cleared').length;
            const size = parseInt(document.getElementById('match-size').value);
            if(cleared === size * size) {
                const diff = document.getElementById('match-diff').value;
                saveRecord('match', size, diff, seconds);
                celebrate();
                stopTimer();
            }
        }

        // --- 排名功能 ---
        function saveRecord(type, size, diff, sec) {
            const records = JSON.parse(localStorage.getItem('game_ranks') || '[]');
            const now = new Date();
            records.push({
                type, size, 
                diff: (diff==='easy'?'輕鬆':diff==='normal'?'一般':'挑戰'),
                sec,
                date: `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes()}`
            });
            localStorage.setItem('game_ranks', JSON.stringify(records));
        }

        function showRank() {
            const typeFilter = document.getElementById('rank-type-filter').value;
            const records = JSON.parse(localStorage.getItem('game_ranks') || '[]');
            const list = document.getElementById('rank-list');
            list.innerHTML = '';

            records
                .filter(r => r.type === typeFilter)
                .sort((a, b) => a.sec - b.sec)
                .forEach(r => {
                    const row = `<tr>
                        <td>${r.size}x${r.size}</td>
                        <td>${r.diff}</td>
                        <td>${r.sec}s</td>
                        <td>${r.date}</td>
                    </tr>`;
                    list.innerHTML += row;
                });
        }
    </script>
</body>
</html>
